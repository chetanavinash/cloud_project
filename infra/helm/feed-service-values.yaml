replicaCount: 2

image:
  repository: "" # Overridden by CI/CD
  pullPolicy: IfNotPresent
  tag: "latest" # Overridden by CI/CD

service:
  type: ClusterIP
  port: 80
  targetPort: 3004

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  - name: PORT
    value: "3004"
  - name: NODE_ENV
    value: "production"
  - name: AWS_REGION
    value: "us-east-1"
  - name: USE_LOCALSTACK
    value: "false"
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: redis-host
  - name: REDIS_PORT
    value: "6379"
  - name: USER_DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: user-database-url
  - name: POST_DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: post-database-url
  - name: SQS_QUEUE_URL
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: feed-sqs-queue-url
