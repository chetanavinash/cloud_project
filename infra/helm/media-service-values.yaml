replicaCount: 2

image:
  repository: "" # Overridden by CI/CD
  pullPolicy: IfNotPresent
  tag: "latest" # Overridden by CI/CD

service:
  type: ClusterIP
  port: 80
  targetPort: 3007

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  - name: PORT
    value: "3007"
  - name: NODE_ENV
    value: "production"
  - name: AWS_REGION
    value: "us-east-1"
  - name: USE_LOCALSTACK
    value: "false"
  - name: S3_BUCKET_NAME
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: s3-bucket-name
  - name: COGNITO_USER_POOL_ID
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: cognito-user-pool-id
  - name: COGNITO_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: app-secrets
        key: cognito-client-id
