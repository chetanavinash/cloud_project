server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Routing (Reverse Proxy / API Gateway to Microservices)

    # 1. User Posts (routed to Post Service)
    location ~ ^/api/v1/users/[^/]+/posts(/|$) {
        proxy_pass http://post-service:80;
    }

    # 2. User Followers/Following/Profile/Register (routed to User Service)
    location ~ ^/api/v1/(register|login|users)(/|$) {
        proxy_pass http://user-service:80;
    }

    # 3. Post Interactions (likes, comments, bookmark, repost - routed to Interaction Service)
    location ~ ^/api/v1/posts/[^/]+/(like|comments|bookmark|repost)(/|$) {
        proxy_pass http://interaction-service:80;
    }

    # 4. Standard Posts (routed to Post Service)
    location ~ ^/api/v1/posts(/|$) {
        proxy_pass http://post-service:80;
    }

    # 5. Feed Service
    location ~ ^/api/v1/feed(/|$) {
        proxy_pass http://feed-service:80;
    }

    # 6. Notification Service
    location ~ ^/api/v1/notifications(/|$) {
        proxy_pass http://notification-service:80;
    }

    # 7. Search Service
    location ~ ^/api/v1/search(/|$) {
        proxy_pass http://search-service:80;
    }

    # 8. Media Service
    location ~ ^/api/v1/media(/|$) {
        proxy_pass http://media-service:80;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Cache static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|otf)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Error pages configuration
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
