version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: social-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - social-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: social-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - social-network
    restart: unless-stopped

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: social-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -inMemory"
    networks:
      - social-network
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.4.0
    container_name: social-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns
      - AWS_DEFAULT_REGION=us-east-1
      - EDGE_PORT=4566
    volumes:
      - ./infra/docker/localstack:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - social-network
    restart: unless-stopped

networks:
  social-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  dynamodb-data:
    driver: local
